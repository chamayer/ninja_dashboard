name: operations-ci

on:
  push:
    branches: [master]
    paths:
      - "operations/**"
      - ".github/workflows/ci.yml"
      - ".pre-commit-config.yaml"
  pull_request:
    paths:
      - "operations/**"
      - ".github/workflows/ci.yml"
      - ".pre-commit-config.yaml"

jobs:
  lint-and-check:
    name: ruff + django check
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: operations
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install operations + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

      - name: django check
        # settings/dev.py falls back to SQLite so no Postgres needed.
        env:
          OPERATIONS_DEBUG: "0"
          DJANGO_SETTINGS_MODULE: config.settings.dev
        run: python manage.py check

      - name: makemigrations --check --dry-run
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
        run: python manage.py makemigrations --check --dry-run
