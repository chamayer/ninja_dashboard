<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ brand.short }}{% endblock %} — {{ brand.name }}</title>
    <style>
        :root {
            --bg: #f5f6f8;
            --surface: #ffffff;
            --header-bg: #1a1a2e;
            --header-fg: #f5f5f5;
            --accent: #4d80c4;
            --border: #dfe1e5;
            --muted: #6b7280;
        }
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background: var(--bg);
            color: #111;
        }
        header {
            background: var(--header-bg);
            color: var(--header-fg);
            padding: 0.9rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }
        header a { color: var(--header-fg); text-decoration: none; }
        .brand { font-weight: 600; font-size: 1.15rem; letter-spacing: 0.02em; }
        .brand small { display: block; font-size: 0.72rem; color: #b3b6c1; font-weight: 400; margin-top: 2px; }
        .selector form { display: flex; align-items: center; gap: 0.5rem; margin: 0; }
        .selector label { font-size: 0.85rem; color: #b3b6c1; }
        .selector select {
            padding: 0.4rem 0.6rem;
            background: #16213e;
            color: var(--header-fg);
            border: 1px solid #333;
            border-radius: 4px;
            font-size: 0.9rem;
            min-width: 220px;
        }
        .user-info { font-size: 0.85rem; color: #b3b6c1; }
        .user-info a { text-decoration: underline; }
        main {
            padding: 2rem 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        h1 { margin-top: 0; font-size: 1.5rem; }
        p.muted { color: var(--muted); font-size: 0.9rem; }
    </style>
</head>
<body>
    <header>
        <div class="brand">
            <a href="{% url 'home' %}">{{ brand.name }}</a>
            {% if brand.tagline %}<small>{{ brand.tagline }}</small>{% endif %}
        </div>

        {% if user.is_authenticated %}
        <div class="selector">
            <form action="{% url 'client_switch' %}" method="get">
                <label for="client-select">Client:</label>
                <select id="client-select" name="slug" onchange="this.form.submit()">
                    <option value="all"{% if org_mode == 'all' %} selected{% endif %}>— All clients —</option>
                    {% for c in clients %}
                        <option value="{{ c.slug }}"{% if current_client and current_client.id == c.id %} selected{% endif %}>{{ c.display_name }}</option>
                    {% endfor %}
                </select>
            </form>
        </div>
        <div class="user-info">
            {{ user.username }} · <a href="{% url 'admin:index' %}">admin</a> · <a href="{% url 'admin:logout' %}">logout</a>
        </div>
        {% else %}
        <div class="user-info"><a href="{% url 'admin:login' %}">log in</a></div>
        {% endif %}
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
