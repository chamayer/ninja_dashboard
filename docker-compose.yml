version: "3.8"

# Env handling — bind-mount + read-at-start (dmarc pattern).
#
# Portainer's git-deployed stacks can't use:
#   - ${VAR} substitution (env panel isn't honored in repository mode)
#   - env_file: with absolute host paths (Portainer's compose process
#     can't see /amr-ch-01_data/ on its own filesystem)
#
# What WORKS is bind-mounting host files into the container — those
# are resolved by the docker daemon server-side. Each service then
# reads its env from the bind-mounted file at startup:
#
#   - ingest:    python-dotenv reads /app/.env (config.py).
#   - postgres:  entrypoint wrapper sources /etc/secrets.env.
#   - metabase:  entrypoint wrapper sources /etc/secrets.env.
#
# Single source of truth: /amr-ch-01_data/ninja-dashboard/.env on host.

services:
  # ───────────────────────────────────────────────────────────────────
  # postgres — main data store (ninja DB) + metabase app DB
  # ───────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ninja-postgres
    restart: unless-stopped
    # Wrap the official entrypoint: source the bind-mounted env file,
    # export everything in it (`set -a`), then exec the real entrypoint.
    # `.` fails loud if /etc/secrets.env is missing, so we don't start
    # postgres with no password.
    entrypoint:
      - /bin/sh
      - -c
      - "set -a; . /etc/secrets.env; set +a; exec docker-entrypoint.sh postgres"
    volumes:
      - /amr-ch-01_data/ninja-dashboard/.env:/etc/secrets.env:ro
      - /amr-ch-01_data/ninja-dashboard/postgres-data:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d:ro
    # No public port — Metabase and ingest reach Postgres on the
    # internal docker network. For ad-hoc psql:
    #   docker exec -it ninja-postgres psql -U ninja -d ninja
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ───────────────────────────────────────────────────────────────────
  # metabase — dashboards
  # ───────────────────────────────────────────────────────────────────
  metabase:
    image: metabase/metabase:latest
    container_name: ninja-metabase
    restart: unless-stopped
    # Same wrapper trick. metabase's real entrypoint is /app/run_metabase.sh.
    entrypoint:
      - /bin/sh
      - -c
      - "set -a; . /etc/secrets.env; set +a; exec /app/run_metabase.sh"
    environment:
      # Static — never overridden, not in the .env file.
      MB_DB_TYPE: postgres
      MB_DB_HOST: postgres
      MB_DB_PORT: 5432
    volumes:
      - /amr-ch-01_data/ninja-dashboard/.env:/etc/secrets.env:ro
      - /amr-ch-01_data/ninja-dashboard/metabase-data:/metabase-data
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ───────────────────────────────────────────────────────────────────
  # ingest — Python service, pulls Ninja API on schedule into Postgres
  # Built from this repo by Portainer on every git push.
  # ───────────────────────────────────────────────────────────────────
  ingest:
    build: .
    container_name: ninja-ingest
    restart: unless-stopped
    environment:
      # Static — never overridden. Pin DB host/port to docker network.
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    volumes:
      # Bind-mount the host .env into the container. config.py uses
      # python-dotenv to load /app/.env at startup and merge into
      # os.environ. Same trick as dmarc-manager.
      - /amr-ch-01_data/ninja-dashboard/.env:/app/.env:ro
    # Loopback only — /healthz and /run are operator endpoints, not LAN.
    ports:
      - "127.0.0.1:8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
