version: "3.8"

# Env handling — bind-mount + read-at-start (dmarc pattern).
#
# Portainer Repository-mode stacks have two firm constraints:
#   - No ${VAR} substitution (env panel isn't honored in repo mode).
#   - No env_file: with absolute host paths (Portainer's compose can't
#     see /amr-ch-01_data/ on its own filesystem).
#   - Repo-relative bind-mounts at runtime do NOT work — Portainer
#     extracts the repo only for build contexts, not as a persistent
#     tree on disk. Anything that needs files from git at RUNTIME
#     either ships in the image (via Dockerfile COPY) or sits under
#     /amr-ch-01_data/<stack>/ as a host file (and is bind-mounted by
#     absolute path).
#
# What DOES work:
#   - Bind-mounts of absolute host paths (docker daemon resolves them).
#   - Image builds from the cloned repo via `build:` directives.
#
# Result: each service reads its env from the bind-mounted host .env
# at startup:
#   - ingest    → python-dotenv reads /app/.env (config.py).
#   - postgres  → entrypoint wrapper sources /etc/secrets.env.
#   - metabase  → entrypoint wrapper sources /etc/secrets.env.
# Init script for postgres ships baked into the custom image.
# Single source of truth for secrets: /amr-ch-01_data/ninja-dashboard/.env.

services:
  # ───────────────────────────────────────────────────────────────────
  # postgres — main data store (ninja DB) + metabase app DB
  # Built from postgres.Dockerfile so the init script is in the image.
  # ───────────────────────────────────────────────────────────────────
  postgres:
    build:
      context: .
      dockerfile: postgres.Dockerfile
    container_name: ninja-postgres
    restart: unless-stopped
    shm_size: "1gb"
    # Wrap the official entrypoint: source the bind-mounted env file,
    # export everything in it (`set -a`), then exec the real entrypoint.
    # `.` fails loud if /etc/secrets.env is missing, so we don't start
    # postgres with no password.
    entrypoint:
      - /bin/sh
      - -c
      - "set -a; . /etc/secrets.env; set +a; exec docker-entrypoint.sh postgres"
    volumes:
      - /amr-ch-01_data/ninja-dashboard/.env:/etc/secrets.env:ro
      - postgres-data:/var/lib/postgresql/data
    # No public port — Metabase and ingest reach Postgres on the
    # internal docker network. For ad-hoc psql:
    #   docker exec -it ninja-postgres psql -U ninja -d ninja
    healthcheck:
      # Route through the unix socket so we hit pg_hba's `local all all
      # trust` rule, not the TCP path that needs scram-sha-256 auth.
      # Bare `pg_isready` defaults to TCP localhost and sends the OS
      # user as the username — that's `root` inside the exec, which
      # spams `FATAL: role "root" does not exist` every interval even
      # though the probe itself returns "ready".
      test: ["CMD", "pg_isready", "-h", "/var/run/postgresql"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ───────────────────────────────────────────────────────────────────
  # metabase — dashboards
  # ───────────────────────────────────────────────────────────────────
  metabase:
    image: metabase/metabase:latest
    container_name: ninja-metabase
    restart: unless-stopped
    # Same wrapper trick. metabase's real entrypoint is /app/run_metabase.sh.
    entrypoint:
      - /bin/sh
      - -c
      - "set -a; . /etc/secrets.env; set +a; exec /app/run_metabase.sh"
    environment:
      # Static — never overridden, not in the .env file.
      MB_DB_TYPE: postgres
      MB_DB_HOST: postgres
      MB_DB_PORT: 5432
    volumes:
      - /amr-ch-01_data/ninja-dashboard/.env:/etc/secrets.env:ro
      - metabase-data:/metabase-data
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ───────────────────────────────────────────────────────────────────
  # ingest — Python service, pulls Ninja API on schedule into Postgres
  # Built from ingest.Dockerfile by Portainer on every git push.
  # ───────────────────────────────────────────────────────────────────
  ingest:
    build:
      context: .
      dockerfile: ingest.Dockerfile
    container_name: operations-ingest
    restart: unless-stopped
    environment:
      # Static — never overridden. Pin DB host/port to docker network.
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    volumes:
      # Bind-mount the host .env into the container. config.py uses
      # python-dotenv to load /app/.env at startup and merge into
      # os.environ. Same trick as dmarc-manager.
      - /amr-ch-01_data/ninja-dashboard/.env:/app/.env:ro
    # Publish the operator endpoints on the host so browser links work.
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy

  # ───────────────────────────────────────────────────────────────────
  # operations — Django + DRF service, write-side operator console.
  # Companion to Metabase. Built from operations.Dockerfile.
  # See operations/BLUEPRINT.md.
  # ───────────────────────────────────────────────────────────────────
  operations:
    build:
      context: .
      dockerfile: operations.Dockerfile
    container_name: ninja-operations
    restart: unless-stopped
    environment:
      # Static — never overridden. Pin DB host/port to docker network.
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    volumes:
      # Same env-file bind-mount pattern as ingest. python-dotenv in
      # config/settings/base.py reads /app/.env at import time.
      - /amr-ch-01_data/ninja-dashboard/.env:/app/.env:ro
      # Brand overrides (optional): mount an on-disk theme directory
      # per §4.16 rebrand path. Default AMRose assets ship in-image;
      # this mount only matters when an appliance install overrides.
      # Comment out on any install that ships the default brand.
      # - /amr-ch-01_data/ninja-dashboard/operations/theme:/app/theme:ro
    ports:
      # 3002 — UI + API, published to LAN.
      - "3002:3002"
      # 8091 — health / internal ops, published to host loopback only.
      # Reachable from other containers on the docker network at
      # `operations:8091` and from am-ch-01 host at 127.0.0.1:8091.
      - "127.0.0.1:8091:8091"
    depends_on:
      postgres:
        condition: service_healthy

# ── Named volumes ────────────────────────────────────────────────────
# Auto-managed (NOT external: true). Survives normal stack ops
# (Portainer "stop", "redeploy", `docker compose down`). Only
# destroyed by explicit "remove stack WITH volumes" or
# `docker compose down -v`. Promote to `external: true` once there's
# real data to protect (see TODO.md).
volumes:
  postgres-data:
  metabase-data:
