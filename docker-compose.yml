version: "3.8"

# All secrets / per-host config come from the host-side .env file at
# /amr-ch-01_data/ninja-dashboard/.env, loaded via env_file: on each
# service. The docker daemon resolves env_file paths server-side, so
# Portainer doesn't need to read the host filesystem. Static values
# (service names, ports, fixed types) stay in environment: blocks so
# they can't be wrongly overridden by .env.

services:
  # ───────────────────────────────────────────────────────────────────
  # postgres — main data store (ninja DB) + metabase app DB
  # ───────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ninja-postgres
    restart: unless-stopped
    env_file:
      - /amr-ch-01_data/ninja-dashboard/.env
    volumes:
      - /amr-ch-01_data/ninja-dashboard/postgres-data:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d:ro
    # No public port — Metabase and ingest reach Postgres on the internal
    # docker network. For ad-hoc psql, use `docker exec -it ninja-postgres psql ...`
    # If you really need it published, uncomment and bind to loopback:
    #   ports:
    #     - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ───────────────────────────────────────────────────────────────────
  # metabase — dashboards
  # ───────────────────────────────────────────────────────────────────
  metabase:
    image: metabase/metabase:latest
    container_name: ninja-metabase
    restart: unless-stopped
    env_file:
      - /amr-ch-01_data/ninja-dashboard/.env
    environment:
      # Static — never overridden. Postgres is always reached as the
      # docker service "postgres" on its container port 5432.
      MB_DB_TYPE: postgres
      MB_DB_HOST: postgres
      MB_DB_PORT: 5432
    volumes:
      - /amr-ch-01_data/ninja-dashboard/metabase-data:/metabase-data
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ───────────────────────────────────────────────────────────────────
  # ingest — Python service, pulls Ninja API on schedule into Postgres
  # Built from this repo by Portainer on every git push.
  # ───────────────────────────────────────────────────────────────────
  ingest:
    build: .
    container_name: ninja-ingest
    restart: unless-stopped
    env_file:
      - /amr-ch-01_data/ninja-dashboard/.env
    environment:
      # Static — never overridden. Pin DB host/port to the docker
      # network values regardless of what .env says.
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    volumes:
      # Bind-mount kept as a belt-and-braces fallback: if someone runs
      # `docker exec ninja-ingest python -m ingest.smoke` outside the
      # compose-managed env, python-dotenv still picks up /app/.env.
      - /amr-ch-01_data/ninja-dashboard/.env:/app/.env:ro
    # Loopback only — /healthz and /run are operator endpoints, not for
    # external traffic. Exposed on the host but not the LAN.
    # `curl http://localhost:8090/run` from an SSH session triggers a run.
    ports:
      - "127.0.0.1:8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
